# ..github/workflows/sync.yml
name: Sync domain list

on:
  schedule:
    - cron: '0 3 * * *'  # каждый день в 3:00 UTC
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Fetch upstream data
        run: |
          git clone --depth=1 https://github.com/v2fly/domain-list-community upstream
          mkdir -p data

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Transform
        run: php scripts/transform.php upstream/data data

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "sync: $(date -u '+%Y-%m-%d')"
          git push
